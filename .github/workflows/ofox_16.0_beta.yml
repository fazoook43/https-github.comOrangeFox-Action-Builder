name: ofox_16.0_beta

# Credits to:
# https://github.com/TeamWin
# https://gitlab.com/OrangeFox
# https://github.com/azwhikaru for Recovery Builder Template
# And all Contributors in every repositories I used

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: '12.1'
        type: choice
        options:
          - '12.1'
          - '11.0'
      DEVICE_TREE:
        description: 'OrangeFox Device Tree'
        required: true
        default: 'https://github.com/fazoook43/sweet_test'
      DEVICE_TREE_BRANCH:
        description: 'OrangeFox Device Tree Branch'
        required: true
        default: 'fox_16.0'
      DEVICE_PATH:
        description: 'Specify your Device Path'
        required: true
        default: 'device/xiaomi/sweet'
      DEVICE_NAME:
        description: 'Specify your Device Codename'
        required: true
        default: 'sweet'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
          - 'boot'
          - 'recovery'
          - 'vendorboot'

jobs:
  build:
    name: Build OFR Beta by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Telegram Script
        run: |
          cat <<'EOF' > /tmp/tg_bot.sh
          #!/bin/bash
          MSG="$(printf "$1")"
          TARGET="$2"
          
          # 1. Always send to personal chat
          curl -s --fail \
            -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true > /dev/null 2>&1 || true
            
          # 2. Send to group chat only if TARGET is "all"
          if [ "$TARGET" == "all" ] && [ -n "${{ secrets.TELEGRAM_GROUP_ID }}" ]; then
            curl -s --fail \
              -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_GROUP_ID }}" \
              -d text="$MSG" \
              -d parse_mode="Markdown" \
              -d disable_web_page_preview=true > /dev/null 2>&1 || true
          fi
          EOF
          chmod +x /tmp/tg_bot.sh
          /tmp/tg_bot.sh "🚀 *Starting OrangeFox Build*
          📱 **Device:** \`${{ inputs.DEVICE_NAME }}\`
          🌿 **Branch:** \`${{ inputs.MANIFEST_BRANCH }}\` (Beta)
          👤 **By:** \`${{ github.actor }}\`
          🔗 [View Live Workflow Run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})" "all"

      - name: Clean-up
        uses: rokibhasansagar/slimhub_actions@main

      - name: Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 24

      - name: Build Environment
        run: |
          sudo apt install aria2 -y
          git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
          cd scripts
          sudo bash setup/android_build_env.sh

      - name: Set-up Manifest & Authenticate GitLab
        if: inputs.MANIFEST_BRANCH == '11.0' || inputs.MANIFEST_BRANCH == '12.1'
        run: |
          /tmp/tg_bot.sh "⏳ *Syncing sources started...*" "private"
          echo "SYNC_START=$(date +%s)" >> $GITHUB_ENV

          # إعداد بيانات الدخول لـ GitLab علشان يقدر يسحب المستودعات الخاصة
          git config --global url."https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/".insteadOf "https://gitlab.com/"

          mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
          cd ${GITHUB_WORKSPACE}/OrangeFox
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          
          # سحب السورس الأساسي
          git clone https://gitlab.com/OrangeFox/sync.git -b master
          cd sync
          ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

      - name: Sync Beta Recovery & Vendor
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          
          # مسح ريكفري Public وسحب مستودع الـ Beta الخاص
          rm -rf bootable/recovery
          git clone https://gitlab.com/OrangeFox/Testing/Recovery.git -b fox_16.0-test bootable/recovery
          
          # مسح الـ Vendor القديم وسحب فرع الـ R12 الجديد
          rm -rf vendor/recovery
          git clone https://gitlab.com/OrangeFox/vendor/recovery.git -b fox_16.0 vendor/recovery

          SYNC_END=$(date +%s)
          SYNC_DIFF=$((SYNC_END - SYNC_START))
          /tmp/tg_bot.sh "✅ *Sync completed successfully* ⏱️ Took: $((SYNC_DIFF / 60)) mins and $((SYNC_DIFF % 60)) secs." "private"

      - name: Clone Device Tree
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}
          cd ${{ inputs.DEVICE_PATH }}
          echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV
          /tmp/tg_bot.sh "🌲 *Device tree cloned*
          Commit: \`$(git rev-parse --short HEAD)\`" "private"

      - name: Building OrangeFox
        run: |
          /tmp/tg_bot.sh "⚙️ *Starting recovery build...*" "private"
          BUILD_START=$(date +%s)
          echo "BUILD_START=$BUILD_START" >> $GITHUB_ENV

          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          set +e
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          set -e
          lunch twrp_${{ inputs.DEVICE_NAME }}-eng && make clean && mka adbd ${{ inputs.BUILD_TARGET }}image
          
          BUILD_END=$(date +%s)
          BUILD_DIFF=$((BUILD_END - BUILD_START))
          echo "BUILD_DIFF=$BUILD_DIFF" >> $GITHUB_ENV

      - name: Set Release Properties
        run: |
          echo "BUILD_DATE=$(TZ=Asia/Manila date +%Y%m%d)" >> $GITHUB_ENV
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

          DEVICE_TREE_URL="${{ inputs.DEVICE_TREE }}"
          if [[ "${DEVICE_TREE_URL}" == *.git ]]; then
            DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
          fi
          echo "DEVICE_TREE_URL=${DEVICE_TREE_URL}" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.img
            OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.zip
          name: OrangeFox Recovery for ${{ inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }} // Official Beta
          tag_name: ${{ github.run_id }}
          body: |
            ## OrangeFox Recovery Build - Official Beta
            - **Maintainer:** Mostafameesr
            - **Build:** fox_${{ inputs.MANIFEST_BRANCH }} (Beta)
            - **Device:** [Device Tree/Branch](${{ env.DEVICE_TREE_URL }}/tree/${{ inputs.DEVICE_TREE_BRANCH }})
            - **Commit:** Most recent [commit](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }}) during building.

      - name: Notify Release Success
        if: success()
        run: |
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_RUN_ID}"
          /tmp/tg_bot.sh "🎉 *Build and Release Successful!*
          ⏱️ Build Time: $(($BUILD_DIFF / 60)) mins and $(($BUILD_DIFF % 60)) secs.
          
          📱 **Device:** \`${{ inputs.DEVICE_NAME }}\`
          📦 **Android Version:** \`${{ inputs.MANIFEST_BRANCH }}\` (Fox_16_Beta)
          
          🔗 [📥 Click here to download Recovery files]($RELEASE_URL)" "all"

      - name: Notify Build Failure
        if: failure()
        run: |
          /tmp/tg_bot.sh "❌ *Build Failed!*
          An error occurred while building \`${{ inputs.DEVICE_NAME }}\`
          🔗 [🔍 Click here to view Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})" "all"

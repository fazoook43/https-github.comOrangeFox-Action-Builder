name: Universal Recovery Builder (Mostafameesr Edition)

on:
  workflow_dispatch:
    inputs:
      RECOVERY_TYPE:
        description: 'Select Recovery Type'
        required: true
        default: 'PBRP'
        type: choice
        options:
        - PBRP
        - OrangeFox
        - TWRP

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup & Free Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /var/lib/mysql
        sudo apt-get purge azure-cli google-cloud-sdk hhvm google-chrome-stable firefox powershell mono-devel
        sudo apt-get autoremove -y
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig

    - name: Set up Repo Tool
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync Manifest (Dynamic Selection)
      run: |
        mkdir work
        cd work
        if [ "${{ github.event.inputs.RECOVERY_TYPE }}" == "PBRP" ]; then
          repo init -u https://github.com/PitchBlackRecoveryProject/manifest_pb -b android-12.1
        elif [ "${{ github.event.inputs.RECOVERY_TYPE }}" == "OrangeFox" ]; then
          repo init -u https://gitlab.com/OrangeFox/Manifest.git -b 12.1
        else
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twr_aosp.git -b twrp-12.1
        fi
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree (Automatic Branch Selection)
      run: |
        cd work
        if [ "${{ github.event.inputs.RECOVERY_TYPE }}" == "PBRP" ]; then
          BRANCH="pbrp_12.1"
        elif [ "${{ github.event.inputs.RECOVERY_TYPE }}" == "OrangeFox" ]; then
          BRANCH="fox_12.1"
        else
          BRANCH="twrp_12.1"
        fi
        git clone https://github.com/Mostafameesr/Neom_android_device_xiaomi_sweet-TWRP -b $BRANCH device/xiaomi/sweet

    - name: Build Recovery
      run: |
        cd work
        . build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_sweet-eng
        if [ "${{ github.event.inputs.RECOVERY_TYPE }}" == "OrangeFox" ]; then
          mka recoveryimage -j$(nproc --all)
        else
          mka p recoveryimage -j$(nproc --all)
        fi

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        files: |
          work/out/target/product/sweet/recovery.img
          work/out/target/product/sweet/*.zip
        tag_name: ${{ github.event.inputs.RECOVERY_TYPE }}-sweet-${{ github.run_id }}
        name: ${{ github.event.inputs.RECOVERY_TYPE }} for Redmi Note 10 Pro
        body: |
          Build: ${{ github.event.inputs.RECOVERY_TYPE }}
          Device: sweet
          Maintainer: @Mostafameesr
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Universal Recovery Builder (PBRP-Official-Style)

on:
  workflow_dispatch:
    inputs:
      RECOVERY_TYPE:
        description: 'Select Recovery Type'
        required: true
        default: 'PBRP'
        type: choice
        options:
        - PBRP
        - OrangeFox
        - TWRP

env:
  MANIFEST_URL: "https://github.com/PitchBlackRecoveryProject/manifest_pb"
  MANIFEST_BRANCH: "android-12.1"
  DEVICE_TREE_URL: "https://github.com/Mostafameesr/Neom_android_device_xiaomi_sweet-TWRP"
  DEVICE_TREE_BRANCH: "pbrp_12.1"
  DEVICE_PATH: "device/xiaomi/sweet"
  DEVICE_NAME: "sweet"
  MAKEFILE_NAME: "twrp_sweet"
  BUILD_TARGET: "recovery"

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup & Free Space
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /var/lib/mysql
        sudo apt-get purge azure-cli google-cloud-sdk hhvm google-chrome-stable firefox powershell mono-devel
        sudo apt-get autoremove -y
        sudo apt-get clean

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig

    - name: Set up Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync Manifest (Corrected PBRP Link)
      run: |
        mkdir work
        cd work
        repo init -u ${{ env.MANIFEST_URL }} -b ${{ env.MANIFEST_BRANCH }}
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd work
        git clone ${{ env.DEVICE_TREE_URL }} -b ${{ env.DEVICE_TREE_BRANCH }} ${{ env.DEVICE_PATH }}

    - name: Build PBRP
      run: |
        cd work
        . build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch ${{ env.MAKEFILE_NAME }}-eng
        mka p recoveryimage -j$(nproc --all)

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        files: |
          work/out/target/product/${{ env.DEVICE_NAME }}/recovery.img
          work/out/target/product/${{ env.DEVICE_NAME }}/*.zip
        tag_name: PBRP-${{ env.DEVICE_NAME }}-${{ github.run_id }}
        name: PBRP Official-style for ${{ env.DEVICE_NAME }}
        body: |
          Build: PBRP 4.0
          Device: Redmi Note 10 Pro (sweet)
          Maintainer: @Mostafameesr
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

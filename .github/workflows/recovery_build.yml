name: Universal Recovery Builder (OFRP-TWRP-PBRP)

on:
  workflow_dispatch:
    inputs:
      RECOVERY_TYPE:
        description: 'Select Recovery Type'
        required: true
        default: 'OrangeFox'
        type: choice
        options:
        - OrangeFox
        - TWRP
        - PBRP
      MANIFEST_BRANCH:
        description: 'Manifest Branch (11.0 or 12.1)'
        required: true
        default: '12.1'
        type: choice
        options:
        - '12.1'
        - '11.0'
      DEVICE_TREE:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/Mostafameesr/Neom_android_device_xiaomi_sweet-TWRP'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'fox_12.1'
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'device/xiaomi/sweet'
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'sweet'

jobs:
  build:
    name: Build ${{ inputs.RECOVERY_TYPE }} for ${{ inputs.DEVICE_NAME }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Clean-up & Swap Space
      uses: rokibhasansagar/slimhub_actions@main
      
    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: Install Build Tools
      run: |
        sudo apt update
        sudo apt install -y aria2 git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts && sudo bash setup/android_build_env.sh

    - name: Sync Manifest (Based on Selection)
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/WorkDir
        cd ${GITHUB_WORKSPACE}/WorkDir
        if [ "${{ inputs.RECOVERY_TYPE }}" == "OrangeFox" ]; then
          git clone https://gitlab.com/OrangeFox/sync.git -b master
          cd sync && ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/WorkDir/fox_${{ inputs.MANIFEST_BRANCH }}
        elif [ "${{ inputs.RECOVERY_TYPE }}" == "TWRP" ]; then
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-${{ inputs.MANIFEST_BRANCH }}
          repo sync -j$(nproc --all) --force-sync
        elif [ "${{ inputs.RECOVERY_TYPE }}" == "PBRP" ]; then
          repo init -u https://github.com/PitchBlackRecoveryProject/manifest.git -b ${{ inputs.MANIFEST_BRANCH }}
          repo sync -j$(nproc --all) --force-sync
        fi

    - name: Clone Device Tree
      run: |
        # تحديد مسار العمل بناءً على نوع الريكفري
        if [ "${{ inputs.RECOVERY_TYPE }}" == "OrangeFox" ]; then
          BASE_PATH=${GITHUB_WORKSPACE}/WorkDir/fox_${{ inputs.MANIFEST_BRANCH }}
        else
          BASE_PATH=${GITHUB_WORKSPACE}/WorkDir
        fi
        cd $BASE_PATH
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}
        echo "BASE_PATH=$BASE_PATH" >> $GITHUB_ENV

    - name: Build Recovery
      run: |
        cd ${{ env.BASE_PATH }}
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        
        # اختيار أمر الـ Lunch المناسب
        if [ "${{ inputs.RECOVERY_TYPE }}" == "OrangeFox" ]; then
          lunch twrp_${{ inputs.DEVICE_NAME }}-eng
          mka adbd recoveryimage
        else
          lunch twrp_${{ inputs.DEVICE_NAME }}-eng
          mka recoveryimage
        fi

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.BASE_PATH }}/out/target/product/${{ inputs.DEVICE_NAME }}/*.img
          ${{ env.BASE_PATH }}/out/target/product/${{ inputs.DEVICE_NAME }}/*.zip
        name: ${{ inputs.RECOVERY_TYPE }} for ${{ inputs.DEVICE_NAME }}
        tag_name: ${{ github.run_id }}
        body: |
          Built using Universal Recovery Builder
          Type: ${{ inputs.RECOVERY_TYPE }}
          Branch: ${{ inputs.MANIFEST_BRANCH }}

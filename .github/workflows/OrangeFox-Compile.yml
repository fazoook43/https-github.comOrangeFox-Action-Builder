name: OrangeFox - Build (14.1)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: '14.1'
        type: choice
        options:
        - '14.1'
      RECOVERY_VERSION:
        description: 'Select Recovery Version'
        required: true
        default: 'R11.3'
        type: choice
        options:
        - 'R11.3'
        - 'R12.0-Beta'
      DEVICE_TREE:
        description: 'OrangeFox Device Tree'
        required: true
        default: 'https://github.com/Mostafameesr/Neom_android_device_xiaomi_sweet-TWRP'
      DEVICE_TREE_BRANCH:
        description: 'OrangeFox Device Tree Branch'
        required: true
        default: 'fox_14.1'
      DEVICE_PATH:
        description: 'Specify your Device Path'
        required: true
        default: 'device/xiaomi/sweet'
      DEVICE_NAME:
        description: 'Specify your Device Codename'
        required: true
        default: 'sweet'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot

jobs:
  build:
    name: Build OFR 14.1 by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
              
    - name: Clean-up
      uses: rokibhasansagar/slimhub_actions@main

    - name: Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: Build Environment
      run: |
        sudo apt install aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts
        sudo bash setup/android_build_env.sh
      
    - name: Set-up Manifest
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        git clone https://gitlab.com/OrangeFox/sync.git -b master
        cd sync
        ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

    - name: Clone Device Tree
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}
        cd ${{ inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Building OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        
        # التبديل لسورس R12 من الرابط اللي إنت جبته يدوياً
        if [ "${{ inputs.RECOVERY_VERSION }}" == "R12.0-Beta" ]; then
          echo "Switching to R12 Source (fox_14.1-R12-new)..."
          cd bootable/recovery
          git fetch https://gitlab.com/OrangeFox/vendor/recovery fox_14.1-R12-new
          git checkout FETCH_HEAD
          cd ../..
        fi

        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        set -e
        echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
        
        # استخدام ap2a المخصص لأندرويد 14
        lunch twrp_${{ inputs.DEVICE_NAME }}-ap2a-eng
        
        mka adbd ${{ inputs.BUILD_TARGET }}image
        echo "END_TIME=$(date +%s)" >> $GITHUB_ENV

    - name: Set Release Properties
      run: |
        echo "BUILD_DATE=$(date +%Y/%m/%d)" >> $GITHUB_ENV
        DURATION=$(( $END_TIME - $START_TIME ))
        echo "DURATION=$(date -u -d @${DURATION} +"%Mm %Ss")" >> $GITHUB_ENV

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.img
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.zip
        name: OrangeFox ${{ inputs.RECOVERY_VERSION }} (14.1) // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          📱 Device: `${{ inputs.DEVICE_NAME }}` (Redmi Note 10 Pro)
          👤 Maintainer: @mostafameesr
          ⏱ Duration: `${{ env.DURATION }}`
          🌿 Branch: `fox_${{ inputs.MANIFEST_BRANCH }}`

    - name: Send Telegram Notification
      run: |
        curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
        -d chat_id=${{ secrets.TG_CHAT_ID }} \
        -d parse_mode=markdown \
        -d text="✅ *New OrangeFox 14.1 Build Ready!*%0A%0A📱 *Device*: \`${{ inputs.DEVICE_NAME }}\` (sweet)%0A👤 *Maintainer*: @mostafameesr%0A📦 *Version*: \`${{ inputs.RECOVERY_VERSION }}\`%0A⏳ *Duration*: \`${{ env.DURATION }}\`%0A🌿 *Branch*: \`fox_${{ inputs.MANIFEST_BRANCH }}\`%0A%0A⬇️ [Download From GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ github.run_id }})"
